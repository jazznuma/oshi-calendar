name: Fetch events

on:
  workflow_dispatch:
    inputs:
      group:
        description: Group id in config/groups.json (or 'all')
        required: false
        default: all
  schedule:
    # 毎日日本時間 午前3:00 (UTC 18:00) に自動更新
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and extract events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TARGET_GROUP="${{ github.event.inputs.group }}"
          if [ -n "$TARGET_GROUP" ] && [ "$TARGET_GROUP" != "all" ]; then
            echo "Fetching single group: $TARGET_GROUP"
            python scripts/fetch_events.py --group "$TARGET_GROUP"
          else
            echo "Fetching all groups..."
            python scripts/fetch_events.py --group stainy
            python scripts/fetch_events.py --group anthurium
            python scripts/fetch_events.py --group tohkei
            python scripts/fetch_events.py --group hbn
            python scripts/fetch_events.py --group miao
            python scripts/fetch_events.py --group jumpingkiss
          fi

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          git diff --cached --quiet || git commit -m "Update event data"
          git push
