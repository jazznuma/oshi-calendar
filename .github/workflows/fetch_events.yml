name: Fetch events

on:
  workflow_dispatch:
    inputs:
      group:
        description: Group id in config/groups.json
        required: false
        default: stainy
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and extract events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROUP_ID: ${{ github.event.inputs.group || 'stainy' }}
        run: python scripts/fetch_events.py --group "$GROUP_ID"

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          git diff --cached --quiet || git commit -m "Update event data"
          git push
